<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - React</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .volver { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
        form { background: #f1f1f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { display: block; margin-bottom: 10px; width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .btn-eliminar { background-color: #dc3545; padding: 6px 10px; }
        .btn-eliminar:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        /* Estilos de filas alternadas */
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <a href="index.html" class="volver">← Volver al Inicio</a>
    <h1>Ejercicio 3: Formulario y Tabla (React)</h1>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // Estados para la lista y el formulario
            const [personas, setPersonas] = useState([]);
            const [form, setForm] = useState({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });

            // Manejador del formulario
            const handleChange = (e) => {
                setForm({ ...form, [e.target.name]: e.target.value });
            };

            // Cálculo del IMC
            const calcularIMC = (peso, altura) => {
                const p = parseFloat(peso);
                const a = parseFloat(altura);
                if (p > 0 && a > 0) {
                    return (p / (a * a)).toFixed(2);
                }
                return "0";
            };

            // Agregar a la tabla
            const handleSubmit = (e) => {
                e.preventDefault();
                const nuevaPersona = {
                    id: Date.now(),
                    ...form,
                    imc: calcularIMC(form.peso, form.altura)
                };
                setPersonas([...personas, nuevaPersona]);
                
                // Limpiar inputs
                setForm({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });
            };

            // Eliminar fila
            const eliminarPersona = (id) => {
                setPersonas(personas.filter(persona => persona.id !== id));
            };

            return (
                <div>
                    <form onSubmit={handleSubmit}>
                        <input type="text" name="nombre" value={form.nombre} onChange={handleChange} placeholder="Ej: Juan" required />
                        <input type="text" name="apellido" value={form.apellido} onChange={handleChange} placeholder="Ej: Pérez" required />
                        <input type="number" name="edad" value={form.edad} onChange={handleChange} placeholder="Edad" min="1" required />
                        <input type="number" name="altura" value={form.altura} onChange={handleChange} placeholder="Altura en metros (Ej: 1.75)" step="0.01" min="0.1" required />
                        <input type="number" name="peso" value={form.peso} onChange={handleChange} placeholder="Peso en kg (Ej: 75.5)" step="0.1" min="1" required />
                        <button type="submit">Agregar Persona</button>
                    </form>

                    <h2>Listado de Registros Actuales</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura (m)</th>
                                <th>Peso (kg)</th>
                                <th>IMC</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personas.map((p) => (
                                <tr key={p.id}>
                                    <td>{p.nombre}</td>
                                    <td>{p.apellido}</td>
                                    <td>{p.edad}</td>
                                    <td>{p.altura}</td>
                                    <td>{p.peso}</td>
                                    <td><strong>{p.imc}</strong></td>
                                    <td>
                                        <button className="btn-eliminar" onClick={() => eliminarPersona(p.id)}>Eliminar</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        // Renderizado
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
